<style>
  body { margin: 0; background: transparent; }
  .widget { background: white; border-radius: 12px; height: 440px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; border: 1px solid #ddd; }
  .drag { -webkit-app-region: drag; background: #222; color: white; padding: 10px; cursor: grab; display: flex; justify-content: space-between; }
  .no-drag { -webkit-app-region: no-drag; cursor: pointer; }
</style>
<body>
  <div class="widget">
    <div class="drag"><span>Чат</span><button class="no-drag" onclick="window.electron.do('close', {name:'chat'})">X</button></div>
    <div style="padding: 15px;">Тут ваш чат...</div>
  </div>
</body>
</html>
