<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <title>Electron Pro</title>
        <style>
            body {
                font-family: system-ui;
                background: #f0f4f8;
                padding: 20px;
            }
            .box {
                background: white;
                padding: 20px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }
            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                font-size: 13px;
                margin: 15px 0;
            }
            button {
                width: 100%;
                padding: 12px;
                margin-top: 8px;
                border: none;
                border-radius: 8px;
                background: #007bff;
                color: white;
                cursor: pointer;
                font-weight: bold;
            }
            button:hover {
                background: #0056b3;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h3>Система та Керування</h3>
            <div id="sys-info" class="grid">Завантаження...</div>
            <button onclick="openNotify()">Відкрити Сповіщення</button>
            <button onclick="sendMsg()" style="background: #28a745">
                Змінити текст сповіщення
            </button>
            <button onclick="window.electronAPI.quitApp()" style="background: #dc3545">
                Вийти
            </button>
        </div>

        <script>
            const PRESETS = {
                notification: {
                    width: 320,
                    height: 100,
                    frame: false,
                    transparent: true,
                    alwaysOnTop: true,
                    skipTaskbar: true,
                },
            }

            async function init() {
                const data = await window.electronAPI.getSystemInfo()
                document.getElementById('sys-info').innerHTML = `
                <div><b>Платформа:</b> ${data.os.platform}</div>
                <div><b>Пам'ять:</b> ${data.os.freeMem}</div>
            `

                window.electronAPI.on('tray:clicked', (id) => {
                    console.log('Трей клік:', id)
                })
            }

            function openNotify() {
                window.electronAPI.openWindow({
                    name: 'notification',
                    source: { type: 'file', value: 'notify.html' },
                    options: { ...PRESETS.notification, x: window.screen.availWidth - 340, y: 20 },
                })
            }

            function sendMsg() {
                window.electronAPI.sendTo(
                    'notification',
                    'update-text',
                    'Час: ' + new Date().toLocaleTimeString(),
                )
            }

            init()
        </script>
    </body>
</html>
